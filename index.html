<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Learning Notes</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #101728;
      --panel-hover: #16203a;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --border: #26324a;
      --code: #0a1222;
      --danger: #fecaca;
      --bg-glow: #1f2a44;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top right, var(--bg-glow), var(--bg));
    }

    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: 100vh;
    }

    aside {
      border-right: 1px solid var(--border);
      background: rgba(16, 23, 40, 0.92);
      padding: 1.25rem;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    h1 {
      margin: 0 0 0.25rem;
      font-size: 1.2rem;
    }

    .subtitle {
      margin: 0 0 1rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .notes-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.5rem;
    }

    .notes-list button {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--panel);
      border-radius: 10px;
      padding: 0.75rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }

    .notes-list button:hover,
    .notes-list button[aria-current="true"] {
      border-color: var(--accent);
      background: var(--panel-hover);
    }

    main {
      padding: clamp(1rem, 3vw, 2.5rem);
      max-width: 920px;
      width: 100%;
      margin: 0 auto;
      position: relative;
    }

    .theme-picker {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(16, 23, 40, 0.8);
      backdrop-filter: blur(6px);
      color: var(--text);
    }

    .theme-picker label {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .theme-picker select {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      padding: 0.3rem 0.45rem;
      font: inherit;
      cursor: pointer;
    }

    article {
      background: rgba(10, 16, 30, 0.85);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: clamp(1rem, 3vw, 2rem);
      line-height: 1.7;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }

    article h1 { font-size: 1.9rem; margin-top: 0; }
    article h2 { margin-top: 1.7rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    article h3 { margin-top: 1.2rem; }
    article p, article li { color: #d1d5db; }
    article a { color: var(--accent); }
    article table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      border: 1px solid var(--border);
      overflow: hidden;
      border-radius: 10px;
    }
    article th, article td {
      border: 1px solid var(--border);
      padding: 0.55rem 0.65rem;
      text-align: left;
      vertical-align: top;
    }
    article thead th {
      background: rgba(22, 32, 58, 0.8);
      color: var(--text);
    }
    article tbody tr:nth-child(even) {
      background: rgba(16, 23, 40, 0.35);
    }

    pre {
      background: var(--code);
      border: 1px solid #1f2a44;
      border-radius: 10px;
      padding: 0.8rem;
      overflow-x: auto;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.92rem;
    }

    .message { color: var(--muted); }
    .error { color: var(--danger); font-weight: 600; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      aside {
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .theme-picker {
        position: static;
        margin-bottom: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1>📘 My Learning Notes</h1>
      <p class="subtitle">Notes loaded from <code>/notes</code> markdown files.</p>
      <ul class="notes-list" id="notes-list"></ul>
    </aside>

    <main>
      <div class="theme-picker">
        <label for="theme-select">Theme</label>
        <select id="theme-select" aria-label="Select theme color">
          <option value="midnight">Midnight</option>
          <option value="ocean">Ocean</option>
          <option value="forest">Forest</option>
          <option value="sunset">Sunset</option>
        </select>
      </div>
      <article id="viewer" aria-live="polite">
        <p class="message">Loading notes…</p>
      </article>
    </main>
  </div>

  <script>
    const listEl = document.getElementById("notes-list");
    const viewerEl = document.getElementById("viewer");
    const themeSelectEl = document.getElementById("theme-select");
    let notesMeta = [];
    const themes = {
      midnight: {
        "--bg": "#0b1020",
        "--panel": "#101728",
        "--panel-hover": "#16203a",
        "--text": "#e5e7eb",
        "--muted": "#9ca3af",
        "--accent": "#60a5fa",
        "--border": "#26324a",
        "--code": "#0a1222",
        "--danger": "#fecaca",
        "--bg-glow": "#1f2a44"
      },
      ocean: {
        "--bg": "#051721",
        "--panel": "#0a2736",
        "--panel-hover": "#113849",
        "--text": "#ddf4ff",
        "--muted": "#8cb3c9",
        "--accent": "#38bdf8",
        "--border": "#1b4a5f",
        "--code": "#04121a",
        "--danger": "#fecaca",
        "--bg-glow": "#0e3f53"
      },
      forest: {
        "--bg": "#0b1a12",
        "--panel": "#12251a",
        "--panel-hover": "#1b3325",
        "--text": "#e2f4e6",
        "--muted": "#9ac8a8",
        "--accent": "#4ade80",
        "--border": "#2e4d39",
        "--code": "#0a1710",
        "--danger": "#fecaca",
        "--bg-glow": "#24412e"
      },
      sunset: {
        "--bg": "#26110f",
        "--panel": "#3b1815",
        "--panel-hover": "#52201c",
        "--text": "#ffe8df",
        "--muted": "#e3b5a7",
        "--accent": "#fb923c",
        "--border": "#6b322c",
        "--code": "#220d0b",
        "--danger": "#fecaca",
        "--bg-glow": "#5c2620"
      }
    };

    function applyTheme(themeName) {
      const theme = themes[themeName] ?? themes.midnight;
      const rootStyle = document.documentElement.style;
      for (const [key, value] of Object.entries(theme)) {
        rootStyle.setProperty(key, value);
      }
      document.body.style.background = `radial-gradient(circle at top right, ${theme["--bg-glow"]}, ${theme["--bg"]})`;
      themeSelectEl.value = themeName in themes ? themeName : "midnight";
    }

    function initTheme() {
      const savedTheme = localStorage.getItem("notes-theme") || "midnight";
      applyTheme(savedTheme);
      themeSelectEl.addEventListener("change", (event) => {
        const nextTheme = event.target.value;
        applyTheme(nextTheme);
        localStorage.setItem("notes-theme", nextTheme);
      });
    }

    function escapeHtml(input) {
      return input
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function applyInlineMarkdown(text) {
      return text
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/\*([^*]+)\*/g, "<em>$1</em>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
    }

    function splitTableRow(line) {
      const trimmed = line.trim();
      const unwrapped = trimmed.replace(/^\|/, "").replace(/\|$/, "");
      return unwrapped.split("|").map((cell) => cell.trim());
    }

    function isTableSeparator(line) {
      const cells = splitTableRow(line);
      return cells.length > 0 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
    }

    function markdownToHtml(markdown) {
      const safe = escapeHtml(markdown).replace(/\r\n/g, "\n");
      const lines = safe.split("\n");
      const out = [];
      let inCode = false;
      let listDepth = 0;

      function closeLists(targetDepth = 0) {
        while (listDepth > targetDepth) {
          out.push("</ul>");
          listDepth -= 1;
        }
      }

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];
        if (line.startsWith("```")) {
          closeLists();
          if (!inCode) {
            out.push("<pre><code>");
            inCode = true;
          } else {
            out.push("</code></pre>");
            inCode = false;
          }
          continue;
        }

        if (inCode) {
          out.push(line + "\n");
          continue;
        }

        const looksLikeTableRow = /^\|.*\|$/.test(line.trim());
        const nextLine = lines[i + 1];
        if (
          looksLikeTableRow &&
          typeof nextLine === "string" &&
          /^\|.*\|$/.test(nextLine.trim()) &&
          isTableSeparator(nextLine)
        ) {
          closeLists();
          const headerCells = splitTableRow(line);
          const bodyRows = [];
          let rowIndex = i + 2;

          while (rowIndex < lines.length && /^\|.*\|$/.test(lines[rowIndex].trim())) {
            bodyRows.push(splitTableRow(lines[rowIndex]));
            rowIndex += 1;
          }

          out.push("<table>");
          out.push("<thead><tr>");
          for (const cell of headerCells) {
            out.push(`<th>${applyInlineMarkdown(cell)}</th>`);
          }
          out.push("</tr></thead>");
          out.push("<tbody>");
          for (const row of bodyRows) {
            out.push("<tr>");
            for (let col = 0; col < headerCells.length; col += 1) {
              out.push(`<td>${applyInlineMarkdown(row[col] ?? "")}</td>`);
            }
            out.push("</tr>");
          }
          out.push("</tbody>");
          out.push("</table>");
          i = rowIndex - 1;
          continue;
        }

        if (/^###\s+/.test(line)) {
          closeLists();
          out.push(`<h3>${applyInlineMarkdown(line.replace(/^###\s+/, ""))}</h3>`);
          continue;
        }
        if (/^##\s+/.test(line)) {
          closeLists();
          out.push(`<h2>${applyInlineMarkdown(line.replace(/^##\s+/, ""))}</h2>`);
          continue;
        }
        if (/^#\s+/.test(line)) {
          closeLists();
          out.push(`<h1>${applyInlineMarkdown(line.replace(/^#\s+/, ""))}</h1>`);
          continue;
        }

        const listMatch = line.match(/^(\s*)-\s+(.+)$/);
        if (listMatch) {
          const spaces = listMatch[1].replace(/\t/g, "  ").length;
          const targetDepth = Math.max(1, Math.floor(spaces / 2) + 1);
          while (listDepth < targetDepth) {
            out.push("<ul>");
            listDepth += 1;
          }
          closeLists(targetDepth);
          out.push(`<li>${applyInlineMarkdown(listMatch[2])}</li>`);
          continue;
        }

        if (line.trim() === "") {
          closeLists();
          continue;
        }

        closeLists();
        out.push(`<p>${applyInlineMarkdown(line)}</p>`);
      }

      closeLists();
      if (inCode) out.push("</code></pre>");
      return out.join("\n");
    }

    function renderList(activeId) {
      listEl.innerHTML = "";
      for (const note of notesMeta) {
        const li = document.createElement("li");
        const button = document.createElement("button");
        button.textContent = note.title;
        button.setAttribute("aria-current", String(note.id === activeId));
        button.addEventListener("click", () => {
          location.hash = note.id;
        });
        li.appendChild(button);
        listEl.appendChild(li);
      }
    }

    async function renderNoteById(id) {
      const active = notesMeta.find((n) => n.id === id) ?? notesMeta[0];
      if (!active) {
        viewerEl.innerHTML = '<p class="error">No notes found. Add markdown files under <code>notes/</code>.</p>';
        return;
      }

      renderList(active.id);
      document.title = `${active.title} | My Learning Notes`;
      viewerEl.innerHTML = '<p class="message">Loading note…</p>';

      try {
        const res = await fetch(active.file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const md = await res.text();
        viewerEl.innerHTML = markdownToHtml(md);
      } catch (err) {
        viewerEl.innerHTML = `<p class="error">Could not load <code>${active.file}</code> (${escapeHtml(String(err))}).</p>`;
      }
    }

    function route() {
      const id = location.hash.replace("#", "");
      renderNoteById(id);
    }

    async function init() {
      initTheme();

      try {
        const res = await fetch("notes/index.json");
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        notesMeta = await res.json();
      } catch (err) {
        viewerEl.innerHTML = `<p class="error">Failed to load <code>notes/index.json</code> (${escapeHtml(String(err))}).</p>`;
        return;
      }

      window.addEventListener("hashchange", route);
      route();
    }

    init();
  </script>
</body>
</html>
